# One-off, manually triggered: publishes the 0.0.0 placeholder that holds the
# `topokit` name on PyPI (doc 10). Uses trusted publishing (OIDC, no secrets);
# the PyPI side is a pending publisher configured for this repo + workflow
# filename. Real releases get their own release.yml (WP-4.3).
name: Publish placeholder
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build the placeholder distribution
        run: uv build packaging/placeholder
      - name: Refuse anything but the 0.0.0 placeholder
        run: |
          ls packaging/placeholder/dist
          test -f packaging/placeholder/dist/topokit-0.0.0-py3-none-any.whl
          test -f packaging/placeholder/dist/topokit-0.0.0.tar.gz
          test "$(ls packaging/placeholder/dist | wc -l)" -eq 2
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packaging/placeholder/dist
